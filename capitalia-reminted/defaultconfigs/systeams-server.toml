#Systeams Config
#---------------
#The multiplier on the steam dynamo's RF/t
#Range: 10 ~ 32000
steam_dynamo_base_power = 20
#If the Dynamo in dynamo augment tooltips should be replaced with Dynamo & Boiler
#This doesn't have as much support for translations (it can still be translated with the key info.systeams.augment.type.DynamoBoiler)
replace_dynamo_augment_tooltips = true

["Steam Values"]
	#The number of mb of steam produced per RF of energy usually produced by the same fuel in a dynamo
	#Note that this does not affect the steam dynamo's rates. That needs to be adjusted with a datapack
	#Range: 0.05 ~ 100.0
	stirling = 0.5
	#Range: 0.05 ~ 100.0
	magmatic = 1.25
	#Range: 0.05 ~ 100.0
	compression = 1.5
	#Range: 0.05 ~ 100.0
	numismatic = 0.75
	#Range: 0.05 ~ 100.0
	lapidary = 0.75
	#Range: 0.05 ~ 100.0
	disenchantment = 2.0
	#Range: 0.05 ~ 100.0
	gourmand = 0.5
	#Range: 0.05 ~ 100.0
	pneumatic = 0.5
	#Range: 0.05 ~ 100.0
	frost = 0.5

["Boiler Speed Multipliers"]
	#The speed multiplier on each boiler's mB/t
	#Range: 0.05 ~ 20.0
	stirling = 1.5
	#Range: 0.05 ~ 20.0
	magmatic = 2.5
	#Range: 0.05 ~ 20.0
	compression = 3.0
	#Range: 0.05 ~ 20.0
	numismatic = 2.0
	#Range: 0.05 ~ 20.0
	lapidary = 2.0
	#Range: 0.05 ~ 20.0
	disenchantment = 4.0
	#Range: 0.05 ~ 20.0
	gourmand = 2.0
	#Range: 0.05 ~ 20.0
	pneumatic = 2.0
	#Range: 0.05 ~ 20.0
	frost = 2.0

["Integration settings"]
	#If you can shift right click a Pneumatic Boiler with an Advanced Pneumatic Tube to convert it to a Pneumatic Dynamo
	#This can get annoying when trying to place Advanced Pneumatic Tubes next to boilers
	pneumatic_boiler_conversion_to_dynamo = true

